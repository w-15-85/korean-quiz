<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한국어 2A 8과 문법 종합 퀴즈</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --bg: #f4f7f6; --success: #27ae60; --error: #e74c3c; }
        body { font-family: 'Malgun Gothic', sans-serif; background: var(--bg); margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 3px solid var(--accent); margin-bottom: 20px; padding-bottom: 15px; }
        
        /* 타이머 */
        .timer-wrapper { position: sticky; top: 0; background: white; padding: 10px; z-index: 100; border-bottom: 2px solid #eee; text-align: right; margin-bottom: 20px; }
        #timer { font-size: 1.5em; font-weight: bold; color: var(--error); }

        /* 점수판 */
        #scoreDisplay { display: none; background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 25px; }
        
        .section-title { background: #ecf0f1; color: #2c3e50; padding: 10px 15px; border-left: 5px solid var(--accent); margin-top: 30px; border-radius: 3px; }
        .question-block { border-bottom: 1px solid #eee; padding: 15px 0; }
        .dialogue { background: #fdfdfd; padding: 10px; margin: 10px 0; border-radius: 5px; font-style: italic; }
        
        input[type="text"] { padding: 5px 10px; border: 1px solid #ccc; border-radius: 4px; width: 150px; font-size: 1em; }
        .result-msg { font-weight: bold; margin-top: 8px; display: block; }
        .correct { color: var(--success); }
        .incorrect { color: var(--error); }

        .btn-submit { display: block; width: 100%; background: var(--accent); color: white; border: none; padding: 15px; font-size: 1.2em; border-radius: 8px; cursor: pointer; margin-top: 30px; font-weight: bold; transition: 0.3s; }
        .btn-submit:hover { background: #d35400; }
    </style>
</head>
<body>

<div class="container">
    <div class="timer-wrapper">남은 시간: <span id="timer">30:00</span></div>

    <div class="header">
        <h2>📖 2A 8과: 정말 속상하겠어요</h2>
        <p>이름: <input type="text" id="userName" placeholder="이름 입력" style="width:150px;"></p>
    </div>

    <div id="scoreDisplay">
        <h3 id="userResultName">결과 리포트</h3>
        <div style="font-size: 2.5em; font-weight: bold;"><span id="finalScore">0</span> / 100점</div>
        <p id="comment"></p>
    </div>

    <h3 class="section-title">1. A/V-겠- (추측/공감)</h3>
    <div id="sec1"></div>

    <h3 class="section-title">2. N 때문에 (이유)</h3>
    <div id="sec2"></div>

    <h3 class="section-title">3. V-아/어 버리다 (완료/아쉬움)</h3>
    <div id="sec3"></div>

    <h3 class="section-title">4. A/V-(으)ㄹ 때 (시간)</h3>
    <div id="sec4"></div>

    <button class="btn-submit" id="submitBtn" onclick="gradeQuiz()">제출 및 채점하기</button>
</div>
